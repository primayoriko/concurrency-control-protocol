name: C/C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_local:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v2
    - name: test
      run: make test
  
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: test
      run: make test
  
  